{% extends 'core/base.html' %}

{% block content %}
<div class="card">
    <h2>{{ acao }} na conta {{ conta.numero_conta }}</h2>
    <p style="margin-bottom: 20px; color: #6b7280;">Cliente: {{ conta.cliente.nome }}</p>

    <form method="POST">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label for="id_valor" style="font-weight: bold;">Valor (R$):</label>
            {{ form.valor }}
        </div>
        
        <button type="submit" class="btn btn-primary">Confirmar {{ acao }}</button>
        <a href="{% url 'detalhe_conta' conta.id %}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
{% endblock %}
